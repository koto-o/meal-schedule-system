<form method="post">

<h3>朝食</h3>
<input
type="radio"
name="breakfast"
value="1"
{% if schedule and schedule.breakfast %}checked{% endif %}
>
必要

<input
type="radio"
name="breakfast"
value="0"
{% if not schedule or not schedule.breakfast %}checked{% endif %}
>
不要
<div id="breakfast_area">
    <h4>朝食メッセージ</h4>
    <textarea name="breakfast_message">{{ schedule.breakfast_message if schedule else '' }}</textarea>
</div>

<h3>昼食</h3>
<input
type="radio"
name="lunch"
value="1"
{% if schedule and schedule.lunch %}checked{% endif %}
>
必要

<input
type="radio"
name="lunch"
value="0"
{% if not schedule or not schedule.lunch %}checked{% endif %}
>
不要
<div id="lunch_area">
    <h4>昼食メッセージ</h4>
    <textarea name="lunch_message">{{ schedule.lunch_message if schedule else '' }}</textarea>
</div>

<h3>夕食</h3>
<input
type="radio"
name="dinner"
value="1"
{% if schedule and schedule.dinner %}checked{% endif %}
>
必要

<input
type="radio"
name="dinner"
value="0"
{% if not schedule or not schedule.dinner %}checked{% endif %}
>
不要
<div id="dinner_area">
    <h4>夕食メッセージ</h4>
    <textarea name="dinner_message">{{ schedule.dinner_message if schedule else '' }}</textarea>
</div>

<div id="return_time_area">
    <h3>帰宅時間</h3>
    <input
    type="time"
    name="return_time"
    value="{{ schedule.return_time if schedule else '' }}"
    >
</div>

<br><br>

<button type="submit">
登録
</button>

</form>

<script>
function toggleInput() {

    // 朝食メッセージ
    document.getElementById("breakfast_area").style.display =
        document.querySelector('input[name="breakfast"]:checked').value == "1"
        ? "block" : "none";

    // 昼食メッセージ
    document.getElementById("lunch_area").style.display =
        document.querySelector('input[name="lunch"]:checked').value == "1"
        ? "block" : "none";

    // 夕食メッセージ
    document.getElementById("dinner_area").style.display =
        document.querySelector('input[name="dinner"]:checked').value == "1"
        ? "block" : "none";

    // 帰宅時間（夕食が必要のときだけ）
    document.getElementById("return_time_area").style.display =
        document.querySelector('input[name="dinner"]:checked').value == "1"
        ? "block" : "none";
}

document.querySelectorAll('input[name="breakfast"]').forEach(e =>
    e.addEventListener("change", toggleInput)
);

document.querySelectorAll('input[name="lunch"]').forEach(e =>
    e.addEventListener("change", toggleInput)
);

document.querySelectorAll('input[name="dinner"]').forEach(e =>
    e.addEventListener("change", toggleInput)
);

toggleInput();
</script>
